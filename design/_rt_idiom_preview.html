<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>rt-idiom preview</title>
<style>
body { background:#141313; color:#e5e2e1; font-family:'Hanken Grotesk',sans-serif; padding:40px; }
.row { background:#181717; border:1px solid #252424; border-radius:14px; padding:14px 18px; margin:20px 0; }
.label { font-family:'JetBrains Mono',monospace; font-size:11px; color:#475569; margin-bottom:8px; }
.def { font-size:15.5px; line-height:1.8; }
.register-tag { font-family:'Hanken Grotesk',sans-serif; font-size:10px; font-weight:700; font-style:italic; padding:1px 7px; border-radius:9999px; display:inline-flex; align-items:center; margin-right:6px; vertical-align:middle; }
.rt-amber   { color:#fb923c; background:#431407; border:1px solid #7c2d12; }
.rt-warm    { color:#fbbf24; background:#2d1a00; border:1px solid #78350f; }
.rt-red     { color:#fca5a5; background:#450a0a; border:1px solid #7f1d1d; }
.rt-subject { color:#c4b5fd; background:#1e1b4b; border:1px solid #4338ca; }
.rt-idiom   { color:#86efac; background:#031a0e; border:1px solid #166534; }
</style></head>
<body>
<div class="row">
  <div class="label">[idiom] only</div>
  <div class="def"><span class="register-tag rt-idiom">idiom</span> a piece of cake — something very easy to do.</div>
</div>
<div class="row">
  <div class="label">[informal, idiom] combined</div>
  <div class="def"><span class="register-tag rt-amber">informal</span><span class="register-tag rt-idiom">idiom</span> bite the bullet — to force yourself to do something unpleasant.</div>
</div>
<div class="row">
  <div class="label">[subject, idiom]</div>
  <div class="def"><span class="register-tag rt-subject">computing</span><span class="register-tag rt-idiom">idiom</span> ball and chain — a heavy responsibility that prevents freedom.</div>
</div>
</body></html>
